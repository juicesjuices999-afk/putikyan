<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }

    button:hover {
      background: #166fe5;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <input type="text" placeholder="Email or Username">
  <input type="password" placeholder="Password">

  <button>Log In</button>
</div>

</body>
</html>
